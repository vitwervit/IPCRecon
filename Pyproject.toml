[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "ipcrecon"
version = "1.0.0"
description = "Enumerate named pipes on remote Windows hosts via IPC$ and identify running software by pipe signatures"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
dependencies = [
    "impacket>=0.11.0",
]

[project.scripts]
ipcrecon = "ipcrecon:main"

[project.urls]
Repository = "https://github.com/vitwervit/IPCRecon"

[tool.setuptools]
py-modules = ["ipcrecon"]
